# PostgreSQL tuning for RXinDexer - Optimized for External SSD + OrbStack
# ============================================================================
listen_addresses = '*'

# Memory Configuration (for 10GB+ RAM systems)
shared_buffers = 4GB              # 25% of available RAM
work_mem = 64MB                   # Per-operation memory for sorts/hashes
maintenance_work_mem = 1GB        # For VACUUM, CREATE INDEX
effective_cache_size = 8GB        # OS cache estimate
temp_buffers = 16MB               # Per-session temp table memory

# Connection Pool (matches API pool settings)
max_connections = 100
max_prepared_transactions = 0

# WAL and Checkpoints (SSD optimized)
synchronous_commit = off          # CRITICAL: Async commits for speed
max_wal_size = 4GB                # Large WAL for bulk inserts
min_wal_size = 1GB
wal_buffers = 64MB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# SSD-Specific Optimizations
random_page_cost = 1.1            # SSD has fast random reads (default 4.0)
effective_io_concurrency = 200    # SSD can handle parallel I/O
seq_page_cost = 1.0

# Parallel Query (leverage multi-core)
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 2
parallel_tuple_cost = 0.01
parallel_setup_cost = 500

# Partitioned Table Optimizations
enable_partitionwise_join = on
enable_partitionwise_aggregate = on
enable_partition_pruning = on

# Autovacuum (tuned for high-write workload)
autovacuum = on
autovacuum_max_workers = 3
autovacuum_vacuum_cost_limit = 2000
autovacuum_vacuum_cost_delay = 10ms
autovacuum_vacuum_scale_factor = 0.02
autovacuum_analyze_scale_factor = 0.01
autovacuum_naptime = 30s

# Logging (minimal for performance)
log_temp_files = 1024
log_checkpoints = on
log_lock_waits = on

# Memory safeguards
huge_pages = off

# Statement timeout (set higher for backfill operations)
statement_timeout = 300s            # 5 minutes default timeout
lock_timeout = 60s                  # 1 minute lock timeout
