# RXinDexer Full Stack Deployment
# Radiant Node + RXinDexer (ElectrumX with Glyph/WAVE/Swap indexing)
# 
# Usage: docker-compose up -d
# See README.md for full documentation

services:
  # Radiant Node (radiantd) - Built from Radiant-Core/Radiant-Core
  radiantd:
    build:
      context: .
      dockerfile: Dockerfile.radiantd
    container_name: radiantd
    restart: unless-stopped
    volumes:
      - radiant-data:/root/.radiant
    ports:
      - "127.0.0.1:7332:7332"   # RPC port (localhost only)
      - "7333:7333"   # P2P port
    # IMPORTANT: keep `command:` a pure folded scalar of flags ONLY. YAML `>`
    # does NOT treat `#` as a comment, so any inline `#` text is folded into the
    # command string and docker compose then rejects the whole file with
    # "'services[radiantd].command' invalid command line string" (which also
    # blocks `docker compose build/up` for rxindexer). Put explanatory notes
    # here, above the key, as real YAML comments.
    #
    # -rpcallowhost: v3.1.0+ added a DNS-rebinding defense that 403-rejects RPC
    # requests whose Host header is a DNS name not in this allowlist. The indexer
    # connects to http://radiantd:7332/ (Host: radiantd) and the Caddy swap proxy
    # forwards Host: swap.radiantcore.org — both must be allowlisted or the
    # indexer/swap RPC breaks. (Loopback + IP-literal Hosts are exempt.)
    command: >
      -server=1
      -printtoconsole
      -rpcuser=${RPC_USER:-radiant}
      -rpcpassword=${RPC_PASS:?RPC_PASS must be set}
      -rpcallowip=0.0.0.0/0
      -rpcbind=0.0.0.0
      -rpcallowhost=radiantd
      -rpcallowhost=swap.radiantcore.org
      -txindex=1
      -swapindex=1
      -zmqpubhashblock=tcp://0.0.0.0:28332
    healthcheck:
      test: ["CMD", "radiant-cli", "-rpcuser=${RPC_USER:-radiant}", "-rpcpassword=${RPC_PASS:?RPC_PASS must be set}", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        reservations:
          memory: 2G

  # RXinDexer Server (ElectrumX with Glyph/WAVE/Swap indexing)
  rxindexer:
    build:
      context: ../..
      dockerfile: docker/full-stack/Dockerfile
    container_name: rxindexer
    restart: unless-stopped
    # Run with tini as PID 1 so orphaned child processes (e.g. RocksDB
    # background threads, asyncio subprocesses) get reaped on shutdown.
    # Without this, python (PID 1) can't reap zombies, leaving the container
    # in a state dockerd cannot kill — causing the restart-manager loop to
    # spin the daemon at 80% CPU until the host is rebooted.
    init: true
    # Memory caps — production safety net.
    # Observed plateau on v3.0.1 with CACHE_MB=2000: python RSS ~8 GiB
    # (4× cache budget, normal pymalloc retention for asyncio+RocksDB).
    # mem_limit 12 GiB → docker OOM-kills the container cleanly on regression
    # (and `restart: unless-stopped` brings it back), instead of letting the
    # host OOM-killer pick a victim (radiantd / caddy) on a 16 GiB host.
    # mem_reservation 4 GiB lets the scheduler avoid evicting us under
    # normal load. Adjust both if CACHE_MB is raised.
    mem_limit: 12g
    mem_reservation: 4g
    depends_on:
      radiantd:
        condition: service_healthy
    volumes:
      # SAFE-BY-DEFAULT: the ~15 GB RocksDB index lives in a HOST bind-mount
      # (./electrumdb -> docker/full-stack/electrumdb), NOT a named volume.
      #
      # Why a bind-mount and not a named volume: production already runs this
      # bind-mount, supplied historically by an untracked override file. A named
      # volume here was a landmine — running `docker compose up` without that
      # override mounted a FRESH EMPTY named volume, so rxindexer would resync
      # the chain from genesis (~24h outage) instead of opening the live index.
      # Binding ./electrumdb directly in the committed base makes the default
      # config point at the SAME on-disk index prod uses, with or without any
      # override. Do NOT revert this to a named volume without a data migration.
      #
      # The runtime ./electrumdb dir (and the SSL key/cert it holds) is
      # gitignored. Ensure it is owned by uid:gid 1000:1000 (matching `user:`),
      # e.g.  sudo chown -R 1000:1000 docker/full-stack/electrumdb
      - ./electrumdb:/data/electrumdb
      - rxindexer-contracts:/data/contracts
    ports:
      - "50010:50010"   # TCP (Electrum protocol)
      - "50011:50011"   # WSS (Photonic wallet, WebSocket subscriptions)
      - "50012:50012"   # SSL (Electrum protocol)
      - "8000:8000"     # REST API (HTTP)
      - "127.0.0.1:8001:8001"  # Admin RPC (localhost only)
    environment:
      # Core configuration
      - DAEMON_URL=http://${RPC_USER:-radiant}:${RPC_PASS:?RPC_PASS must be set}@radiantd:7332/
      - COIN=Radiant
      - NET=mainnet
      - DB_ENGINE=rocksdb
      - DB_DIRECTORY=/data/electrumdb
      - SERVICES=tcp://0.0.0.0:50010,ssl://0.0.0.0:50012,wss://0.0.0.0:50011,ws://0.0.0.0:50013,rpc://127.0.0.1:8001
      - SSL_CERTFILE=/data/electrumdb/server.crt
      - SSL_KEYFILE=/data/electrumdb/server.key
      - REST_API_ENABLED=1
      - REST_API_HOST=0.0.0.0
      - REST_API_PORT=8000
      # REST is bound to 0.0.0.0 (public), so the indexer requires a non-empty
      # REST_API_KEY and explicit ALLOWED_ORIGINS at startup (fail-closed).
      # Set both in your .env. To run REST unauthenticated on purpose, set
      # REST_REQUIRE_API_KEY=0 explicitly (not recommended for public nodes).
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - REST_API_KEY=${REST_API_KEY}
      # Performance tuning
      - CACHE_MB=${CACHE_MB:-2000}
      - MAX_SESSIONS=${MAX_SESSIONS:-10000}
      - MAX_SEND=10000000
      - MAX_RECV=10000000
      - REQUEST_TIMEOUT=60
      # Rate limiting (relaxed for local RPC to prevent throttling disconnects)
      - COST_SOFT_LIMIT=10000
      - COST_HARD_LIMIT=100000
      # Per-IP rate limiter must see the REAL client IP. Behind the Caddy
      # reverse proxy (electrumx.radiantcore.org -> rxindexer:50013) every
      # wallet shares the proxy's socket IP, so without TRUST_PROXY they all
      # collapse into one persisted cost bucket -> "excessive resource usage"
      # lockout for every wallet. Trust Caddy's appended X-Forwarded-For (hops=1
      # reads the proxy-set value, ignoring client-spoofed entries).
      - TRUST_PROXY=1
      - TRUST_PROXY_HOPS=1
      # X-Forwarded-For is honoured ONLY when the socket peer is in this
      # allowlist (the full-stack_default bridge subnet, where Caddy lives at
      # 172.18.0.3). A client connecting DIRECTLY to the published wss listener
      # (:50011) arrives with its real public source IP (iptables DNAT, e.g.
      # "WSS 68.144.166.66"), which is NOT in this subnet, so it cannot spoof
      # X-Forwarded-For to poison a victim IP's persisted cost bucket -- it can
      # only accrue cost against its own IP. The :50010/:50012 (raw TCP/SSL)
      # listeners carry no XFF at all. Subnet (not Caddy's /32) so a Caddy
      # container-IP change cannot silently re-trigger the all-wallet lockout.
      - TRUSTED_PROXIES=172.18.0.0/16
      - INITIAL_CONCURRENT=50
      - REQUEST_SLEEP=500
      # RXinDexer: Glyph token indexing (FT, NFT, dMint, Mutable, Containers)
      - GLYPH_INDEX=${GLYPH_INDEX:-1}
      # RXinDexer: WAVE naming system indexing
      - WAVE_INDEX=${WAVE_INDEX:-1}
      - WAVE_HOT_NAMES=${WAVE_HOT_NAMES:-10000}
      - WAVE_GENESIS_REF=${WAVE_GENESIS_REF:-}
      # RXinDexer: Swap DEX order indexing
      - SWAP_INDEX=${SWAP_INDEX:-1}
      # RXinDexer: Real-time WebSocket subscriptions
      - GLYPH_SUBSCRIPTIONS=${GLYPH_SUBSCRIPTIONS:-1}
      # RXinDexer: Mempool indexing for unconfirmed transactions
      - MEMPOOL_GLYPH_INDEX=${MEMPOOL_GLYPH_INDEX:-1}
      - MEMPOOL_SWAP_INDEX=${MEMPOOL_SWAP_INDEX:-1}
      # RXinDexer: dMint contracts file
      - DMINT_CONTRACTS_FILE=/data/contracts/contracts.json
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50010 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 300s
    stop_signal: SIGTERM
    stop_grace_period: 180s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        reservations:
          memory: 4G
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  radiant-data:
    name: radiant-node-data
  # NOTE: the rxindexer index is intentionally a HOST bind-mount
  # (./electrumdb), declared on the rxindexer service above — NOT a named
  # volume. A former `rxindexer-data: {name: rxindexer-db-data}` named volume
  # was removed because it could silently swap the live index for an empty one
  # (genesis resync). See the comment on the rxindexer `volumes:` block.
  rxindexer-contracts:
    name: rxindexer-contracts-data
